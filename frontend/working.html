<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Malabar Indoor — Working Page</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f3f7ff; color: #0f1e3a; }
    .page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
    .card { max-width: 640px; width: 100%; background: #ffffff; border-radius: 24px; box-shadow: 0 24px 80px rgba(16, 33, 63, 0.12); padding: 2.5rem; }
    h1 { font-size: clamp(2rem, 4vw, 3rem); margin-bottom: 1rem; }
    p { line-height: 1.7; color: #455370; margin-bottom: 1.75rem; }
    a.button { display: inline-flex; align-items: center; justify-content: center; padding: 0.95rem 1.75rem; border-radius: 999px; background: #0052cc; color: #fff; text-decoration: none; font-weight: 700; transition: transform 0.2s ease, box-shadow 0.2s ease; }
    a.button:hover { transform: translateY(-2px); box-shadow: 0 16px 30px rgba(0, 82, 204, 0.18); }
    .status { margin-top: 1rem; font-size: 0.95rem; color: #1d7aee; }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <h1>Malabar Indoor Working Page</h1>
      <p>This page is a simple working frontend page created for the Malabar Indoor project. Use it to verify that your site loads correctly from the `frontend` directory.</p>
      <a class="button" href="index.html">Open Main Homepage</a>
      <div class="status">Page created successfully and ready for deployment.</div>
    </div>
  </div>
</body>
</html>
